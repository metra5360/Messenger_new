<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cipher Architect — Secure Node V2</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* ТЕМНА ТЕМА */
        :root {
            --bg-main: #070708;
            --bg-panel: #111113;
            --bg-key: #18181c;
            --border-color: #1f1f24;
            --text-primary: #ffffff;
            --text-muted: #4e4e56;
            --canvas-bg: #000000;
            --invert-glyphs: invert(1);
        }

        /* СВІТЛА ТЕМА */
        [data-theme="light"] {
            --bg-main: #f0f0f3;
            --bg-panel: #ffffff;
            --bg-key: #f7f7f9;
            --border-color: #e2e2e9;
            --text-primary: #111113;
            --text-muted: #8a8a93;
            --canvas-bg: #ffffff;
            --invert-glyphs: invert(0);
        }

        body {
            background-color: #000000;
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.2s ease;
        }
        
        [data-theme="light"] body {
            background-color: #e2e2e9;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            background-color: var(--bg-main);
            display: flex;
            flex-direction: column;
            position: relative;
            transition: background-color 0.2s ease;
        }

        @media (min-width: 421px) {
            .app-container {
                height: 850px;
                border-radius: 24px;
                border: 1px solid var(--border-color);
                overflow: hidden;
            }
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .brand-identity {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .shield-wrapper {
            background: var(--text-primary);
            color: var(--bg-main);
            padding: 5px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .shield-icon {
            width: 18px;
            height: 18px;
        }

        .brand-titles {
            display: flex;
            flex-direction: column;
        }

        .main-title {
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 3px;
            line-height: 1;
        }

        .sub-title {
            font-size: 10px;
            letter-spacing: 1.5px;
            opacity: 0.6;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .theme-toggle-btn {
            background: var(--bg-key);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            width: 38px;
            height: 38px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: var(--text-primary);
        }

        .design-toggle-node {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 8px 14px;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            height: 38px;
        }

        .design-toggle-node.active {
            border-color: var(--text-primary);
            background: var(--bg-key);
        }

            font-size: 11px;
            font-weight: 700;
