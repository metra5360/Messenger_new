<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cipher Architect</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="brand-zone">
                <div class="shield-icon">🛡️</div>
                <div class="brand-text">
                    <div class="main-title">CIPHER</div>
                    <div class="sub-title">ARCHITECT</div>
                </div>
            </div>
            
            <button class="design-toggle" id="btn-design-toggle">
                <span class="toggle-text">DESIGN</span>
                <span class="toggle-status" id="status-text">OFF</span>
            </button>
        </header>

        <div class="drawing-popup" id="drawing-popup">
            <div class="popup-content">
                <h3>Малюємо символ для літери: <span id="target-letter">A</span></h3>
                <canvas id="paint-canvas" width="200" height="200"></canvas>
                <div class="popup-actions">
                    <button id="btn-clear-canvas">Очистити</button>
                    <button id="btn-save-canvas" class="accent">Зберегти</button>
                </div>
            </div>
        </div>

        <main class="chat-screen" id="chat-screen">
            <div class="message system">Канал активовано. Увімкніть DESIGN ON, щоб намалювати свій унікальний алфавіт.</div>
        </main>

        <div class="input-preview-row">
            <div class="input-preview" id="input-preview" data-placeholder="Натискайте клітинки для введення..."></div>
            <button class="backspace-btn" id="btn-backspace">⌫</button>
        </div>

        <div class="keyboard-grid" id="keyboard-grid"></div>

        <div class="action-bar">
            <button class="space-bar" id="btn-space">
                <div class="space-line"></div>
            </button>
            <button class="send-btn" id="btn-send">🚀</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
