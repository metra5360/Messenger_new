<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cipher Architect — Secure Node V2</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-main: #070708;
            --bg-panel: #111113;
            --bg-key: #18181c;
            --border-color: #1f1f24;
            --text-primary: #ffffff;
            --text-muted: #4e4e56;
        }

        body {
            background-color: #000000;
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            background-color: var(--bg-main);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        @media (min-width: 421px) {
            .app-container {
                height: 850px;
                border-radius: 24px;
                border: 1px solid var(--border-color);
                overflow: hidden;
            }
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .brand-identity {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .shield-wrapper {
            background: #fff;
            color: #000;
            padding: 5px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .shield-icon {
            width: 18px;
            height: 18px;
        }

        .brand-titles {
            display: flex;
            flex-direction: column;
        }

        .main-title {
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 3px;
            line-height: 1;
        }

        .sub-title {
            font-size: 10px;
            letter-spacing: 1.5px;
            opacity: 0.6;
        }

        .design-toggle-node {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 8px 14px;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .design-toggle-node.active {
            border-color: #fff;
            background: #1c1c24;
        }

        .toggle-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .status-indicator-box {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-text {
            font-size: 11px;
            font-family: monospace;
            color: var(--text-muted);
        }

        .design-toggle-node.active .status-text {
            color: #00ff66;
            font-weight: bold;
        }

        .system-meta-bar {
            display: flex;
            justify-content: space-between;
            padding: 8px 20px;
            background: #0b0b0d;
            font-size: 9px;
            font-family: monospace;
            color: #777;
            border-bottom: 1px solid var(--border-color);
        }

        .neon-dim { color: #444; }
        .neon-active { color: #fff; }

        .crypto-hash-banner {
            padding: 6px 20px;
            font-size: 8px;
            font-family: monospace;
            color: #444;
            border-bottom: 1px solid var(--border-color);
        }

        .chat-viewport {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 14px;
        }

        .message.outgoing {
            background: #1c1c22;
            align-self: flex-end;
        }

        .message.incoming {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            align-self: flex-start;
        }

        .message.system {
            background: transparent;
            color: var(--text-muted);
            font-size: 11px;
            align-self: center;
            text-align: center;
            line-height: 1.4;
        }

        .sys-alert { color: #666; font-family: monospace; font-weight: bold; margin-bottom: 2px;}

        .glyph-container {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-items: center;
        }

        .glyph-img {
            height: 22px;
            filter: invert(1);
        }

        .preview-container {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            border-top: 1px solid var(--border-color);
            gap: 10px;
            background: #09090b;
        }

        .input-preview-field {
            flex: 1;
            min-height: 40px;
            display: flex;
            align-items: center;
            gap: 4px;
            overflow-x: auto;
        }

        .input-preview-field:empty:before {
            content: attr(data-placeholder);
            color: var(--text-muted);
            font-size: 12px;
        }

        .backspace-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .backspace-btn svg { width: 18px; height: 18px; }

        .matrix-keyboard-wrapper {
            background-color: var(--bg-panel);
        }

        .keyboard-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            padding: 16px 20px;
        }

        .key {
            background-color: transparent;
            border: 1.5px dashed var(--border-color);
            aspect-ratio: 1;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
        }

        .key.has-drawing {
            border-style: solid;
            border-color: #2a2a32;
            background-color: var(--bg-key);
        }

        .key img {
            max-width: 80%;
            max-height: 80%;
            filter: invert(1);
        }

        .key-label {
            position: absolute;
            bottom: 4px;
            right: 6px;
            font-size: 8px;
            font-family: monospace;
            color: rgba(255, 255, 255, 0.12);
        }

        .keyboard-meta-footer {
            display: flex;
            justify-content: space-between;
            padding: 0 20px 8px 20px;
            background: var(--bg-panel);
            font-size: 8px;
            font-family: monospace;
            color: #333;
        }

        .action-footer {
            display: flex;
            padding: 10px 20px 24px 20px;
            background-color: var(--bg-panel);
            gap: 15px;
            border-top: 1px solid #16161a;
        }

        .space-node-btn {
            flex: 1;
            height: 50px;
            background: var(--bg-key);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .space-bar-graphic {
            width: 35px;
            height: 2px;
            background: var(--text-muted);
        }

        .send-node-btn {
            width: 75px;
            height: 50px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .send-icon { width: 20px; height: 20px; }

        /* Критично важливе виправлення тут: overlay сховано за замовчуванням */
        .drawing-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(8px);
            display: none; /* Завжди сховано, поки не додамо клас .active */
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .drawing-overlay.active {
            display: flex; /* Показується тільки при активному кліку */
        }

        .popup-frame {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .popup-header h3 {
            font-size: 11px;
            letter-spacing: 1px;
            font-family: monospace;
            color: #777;
        }

        .highlight-letter { color: #fff; font-weight: bold; }

        .canvas-container {
            background: #000;
            border: 1px solid #222;
            border-radius: 10px;
            overflow: hidden;
        }

        #paint-canvas {
            display: block;
        }

        .popup-footer {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .ctx-btn {
            flex: 1;
            padding: 11px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-key);
            color: #fff;
            font-family: monospace;
            font-size: 11px;
            cursor: pointer;
        }

        .ctx-btn.accent {
            background: #fff;
            color: #000;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <div class="brand-identity">
                <div class="shield-wrapper">
                    <svg class="shield-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                </div>
                <div class="brand-titles">
                    <h1 class="main-title">CIPHER</h1>
                    <span class="sub-title">ARCHITECT</span>
                </div>
            </div>
            
            <div class="header-controls">
                <button class="design-toggle-node" id="btn-design-toggle">
                    <span class="toggle-label">DESIGN</span>
                    <div class="status-indicator-box">
                        <span class="status-text" id="status-text">OFF</span>
                    </div>
                </button>
            </div>
        </header>

        <div class="system-meta-bar">
            <div class="meta-item"><span class="neon-dim">SYS_STATUS:</span> <span class="neon-active">SECURE</span></div>
            <div class="meta-item"><span class="neon-dim">NODE:</span> <span>01//V2</span></div>
            <div class="meta-item-matrix">MATRIX_26_CELLS</div>
        </div>

        <div class="crypto-hash-banner">
            <span class="hash-label">ENC_ALGO:</span>
            <span class="hash-value">P2P_IMAGE_STREAM_DIRECT</span>
        </div>

        <section class="drawing-overlay" id="drawing-popup">
            <div class="popup-frame">
                <header class="popup-header">
                    <h3>DRAWING GLYPH FOR: <span id="target-letter" class="highlight-letter">A</span></h3>
                </header>
                <div class="canvas-container">
                    <canvas id="paint-canvas" width="220" height="220"></canvas>
                </div>
                <footer class="popup-footer">
                    <button class="ctx-btn" id="btn-clear-canvas">RESET</button>
                    <button class="ctx-btn accent" id="btn-save-canvas">APPLY GLYPH</button>
                </footer>
            </div>
        </section>

        <main class="chat-viewport" id="chat-screen">
            <div class="message system">
                <p class="sys-alert">[SYSTEM ALERT] КАНАЛ СИНХРОНІЗОВАНО</p>
                <p class="sys-instruction">Увімкніть режим "DESIGN ON" зверху, щоб замалювати свої унікальні символи у клітинках нижче.</p>
            </div>
        </main>

        <section class="preview-container">
            <div class="input-preview-field" id="input-preview" data-placeholder="Очікування вводу з матриці..."></div>
            <button class="backspace-btn" id="btn-backspace">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
                    <line x1="18" y1="9" x2="12" y2="15"/>
                    <line x1="12" y1="9" x2="18" y2="15"/>
                </svg>
            </button>
        </section>

        <section class="matrix-keyboard-wrapper">
            <div class="keyboard-grid" id="keyboard-grid"></div>
        </section>

        <div class="keyboard-meta-footer">
            <span class="layer-indicator">LAYER_01 [A-Z]</span>
            <span class="grid-spec">6X5_GRID_NODE</span>
        </div>

        <footer class="action-footer">
            <button class="space-node-btn" id="btn-space">
                <div class="space-bar-graphic"></div>
            </button>
            <button class="send-node-btn" id="btn-send">
                <svg class="send-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </button>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
